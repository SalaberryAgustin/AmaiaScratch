name: Build APK

on:
  push:
    tags:
      - 'v*'             # ← CAMBIADO: solo se dispara con tags como v1.0, v1.1
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Gradle
        uses: gradle/gradle-build-action@v3

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar APK Release
        run: ./gradlew assembleRelease

      - name: Subir APK como artifact      # ← se mantiene como respaldo
        uses: actions/upload-artifact@v4
        with:
          name: AmaiaScratch-APK
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      - name: Adjuntar APK al Release      # ← NUEVO
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release*.apk
